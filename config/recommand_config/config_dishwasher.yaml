# Workflow Configuration

# General workflow settings
workflow:
  name: "Primitive State Segmentation and Clustering"
  description: "Standard ML workflow for processing and training on input data."
  appliance_name: "dishwasher" 

# Step-specific configurations
steps:
  data_loader:
    enabled: false
    input_folder: "input"
    supported_formats: [".npy", ".txt"]
    
  data_processor:
    enabled: false
    normalization: true
    save_figures: true

  wavelet_separation:
    enabled: false
    is_shape_dtw: false
    plot_count: 0

  feature_extract:
    enabled: true
    data_path: "input/dishwasher/data_fusion.npy"
    seq_len_path: "input/dishwasher/seq_length_fusion.npy"
    model_name: "bilstm_ae" # bilstm_ae / lstm_ae / cnn_ae / bilstm_ae_attention / detsec
    latent_dim: 64
    epochs: 50
    batch_size: 32
    learning_rate: 0.001
    patience: 5
    attention_size: 32
  
  time_clustering:
    enabled: false
    data_path: "input/dishwasher/data_fusion.npy"
    feature_path: "input/dishwasher/lstm_ae_features_cleaned_power_64_dim.npy"
    seq_len_path: "input/dishwasher/seq_length_fusion.npy"
    cluster_method: "kmeans"  # hdbscan / dbscan-scan / kmeans / kmeans-scan / hdbscan
    method_specific:
      dbscan:
        eps: 1.25
        min_pts: 20
        metric: "euclidean"
      dbscan-scan:
        min_eps: 0.02
        max_eps: 2.0
        eps_gap: 0.02
        min_pts: 20
        metric: "euclidean"
      kmeans:
        n_clusters: 7
        random_state: 42
        n_init: 30
        max_iter: 300
        metric: "euclidean"
      kmeans-scan:
        min_cluster: 2
        max_cluster: 12
        random_state: 42
        n_init: 30
        max_iter: 300
        metric: "euclidean"
      hdbscan:
        min_cluster_size: 20
        min_samples: 10
        cluster_selection_method: "eom"   # eom / leaf
        cluster_selection_epsilon: 0.0
        metric: "euclidean" 
    normalization_method: "zscore"
    col_index: 2  # the index of the feature column to be used for clustering (0-based)
    visualization_specific:
      enabled: true
      visualize_noise: true
      language: "en"  # zh / en
      cluster_stack_count: 50
    few_shot_detection:
      enabled: true
      method: "avg_percent"  # avg_percent / threshold
      n_percent: 50           # used when method=avg_percent
      threshold: 5            # used when method=threshold

  primitive_activity_mapping:
    enabled: false
    # Folder containing activity CSV files. Each CSV uses column 0 as timestamp.
    activity_sequence_dir: "input/dishwasher/fluss_data"
    # Folder containing primitive npy files (e.g., Cluster_*.npy from previous step).
    primitive_sequence_dir: "log/your_run/TimeClustering"
    # Strategy 1 (default): strict contain only. Strategy 2: tolerant contain with timestamp_tolerance.
    enable_tolerant_match: false
    timestamp_tolerance: 12.0

  dataset_split:
    enabled: false
    # Appliance branch raw long-horizon time series file (.dat or .npy), shape (len, 2): [timestamp, power]
    raw_series_path: "input/dishwasher/raw_series.npy"
    # Mains raw long-horizon time series file (.dat or .npy), shape (len, 2): [timestamp, power]
    mains_series_path: "input/dishwasher/mains_series.npy"
    # If primitive_activity_mapping has run, these can be omitted and resolved from context.
    few_shot_tensor_path: "D:\\KnowledgeDatabase\\ComputerSecience\\PROJ_NILM\\PSLG-NILM\\log\\your_run\\PrimitiveActivityMapping\\few_shot_activity_tensor.npy"
    non_few_shot_tensor_path: "D:\\KnowledgeDatabase\\ComputerSecience\\PROJ_NILM\\PSLG-NILM\\log\\your_run\\PrimitiveActivityMapping\\non_few_shot_activity_tensor.npy"
    # Event metadata with start/end timestamps. If omitted, resolve from context.
    few_shot_activity_json_path: "D:\\KnowledgeDatabase\\ComputerSecience\\PROJ_NILM\\PSLG-NILM\\log\\your_run\\PrimitiveActivityMapping\\few_shot_activity_sequences.json"
    non_few_shot_activity_json_path: "D:\\KnowledgeDatabase\\ComputerSecience\\PROJ_NILM\\PSLG-NILM\\log\\your_run\\PrimitiveActivityMapping\\non_few_shot_activity_sequences.json"

    # Tunable composition hyper-parameters.
    few_train_ratio: 0.5
    non_few_train_ratio: 0.8
    random_seed: 42
    timestamp_tolerance_seconds: 0.0
    clip_negative_mains_to_zero: true
  

# Model hyperparameters
models:
  DummyModel:
    learning_rate: 0.01
    epochs: 10
    batch_size: 32
