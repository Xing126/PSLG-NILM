# Workflow Configuration

# General workflow settings
workflow:
  name: "Primitive State Segmentation and Clustering"
  description: "Standard ML workflow for processing and training on input data."
  appliance_name: "washing_machine" 
  resume: true #设置为true有done会跳过已执行的step
  sequence_id: "20260530_111352"

# Step-specific configurations
steps:
  extract_active_data:
    enabled: true
    method: "simple" # simple / adaptive
    input_file: "input/washing_machine.csv"
    threshold: 5       # 功率阈值 (W)
    t_drop: 600           # 跌落容忍时间 (s)
    t_min_work: 300      # 最小工作时长 (s)
    context_seconds: 120 # 上下文时间窗口 (s)
    fs: 0.1666667 # 采样频率（Hz）

  time_segmentation: # 原 wavelet_separation
    enabled: true
    segment_method: "clasp" # clasp / fluss / espresso
    # fluss specific params
    window_size: 100
    n_regimes: 3
    excl_factor: 5

  feature_extract:
    enabled: false
    data_path: ""
    seq_len_path: ""
    model_name: "detsec"  # lstm_ae / bilstm_ae / bilstm_ae_attention / detsec
    latent_dim: 64
    epochs: 50
    batch_size: 32
    learning_rate: 0.001
    patience: 5
    attention_size: 32
  
  time_clustering:
    enabled: false
    data_path: "" 
    feature_path: "" 
    seq_len_path: "" 
    cluster_method: "kmeans"  # dbscan / dbscan-scan / kmeans / kmeans-scan / hdbscan
    method_specific:
      dbscan:
        eps: 1.25
        min_pts: 20
        metric: "euclidean"
      dbscan-scan:
        min_eps: 0.02
        max_eps: 2.0
        eps_gap: 0.02
        min_pts: 20
        metric: "euclidean"
      kmeans:
        n_clusters: 4
        random_state: 42
        n_init: 30
        max_iter: 300
        metric: "euclidean"
      kmeans-scan:
        min_cluster: 2
        max_cluster: 8
        random_state: 42
        n_init: 30
        max_iter: 300
        metric: "dtw"
      hdbscan:
        min_cluster_size: 20
        min_samples: 10
        cluster_selection_method: "eom"
        cluster_selection_epsilon: 0.0
        metric: "euclidean"
    normalization_method: "zscore"
    col_index: 2  # the index of the feature column to be used for clustering (0-based)
    visualization_specific:
      enabled: true
      visualize_noise: true
      language: "en"  # zh / en
      cluster_stack_count: 50
    few_shot_detection:
      enabled: false
      method: "avg_percent"  # avg_percent / threshold
      n_percent: 50           # used when method=avg_percent
      threshold: 5            # used when method=threshold
  

# Model hyperparameters
models:
  DummyModel:
    learning_rate: 0.01
    epochs: 10
    batch_size: 32
