# Workflow Configuration

# General workflow settings
workflow:
  name: "Primitive State Segmentation and Clustering"
  description: "Standard ML workflow for processing and training on input data."
  appliance_name: "dishwasher" 

# Step-specific configurations
steps:
  data_loader:
    enabled: false
    input_folder: "input"
    supported_formats: [".npy", ".txt"]
    
  data_processor:
    enabled: false
    normalization: true
    save_figures: true

  wavelet_separation:
    enabled: false
    is_shape_dtw: false
    plot_count: 0

  feature_extract:
    enabled: false
    data_path: "D:\\KnowledgeDatabase\\ComputerSecience\\PROJ_NILM\\PSLG-NILM\\data\\fridge\\data_fusion.npy"
    seq_len_path: "D:\\KnowledgeDatabase\\ComputerSecience\\PROJ_NILM\\PSLG-NILM\\data\\fridge\\seq_length_fusion.npy"
    model_name: "bilstm_ae"
    latent_dim: 64
    epochs: 50
    batch_size: 32
    learning_rate: 0.001
    patience: 5
    attention_size: 32
  
  time_clustering:
    enabled: true
    data_path: "D:\\KnowledgeDatabase\\ComputerSecience\\PROJ_NILM\\PSLG-NILM\\data\\fridge\\data_fusion.npy"
    feature_path: "D:\\KnowledgeDatabase\\ComputerSecience\\PROJ_NILM\\PSLG-NILM\\log\\dishwasher_20260507_023549\\FeatureExtract\\extracted_features\\bilstm_ae_file_64dim.npy"
    seq_len_path: "D:\\KnowledgeDatabase\\ComputerSecience\\PROJ_NILM\\PSLG-NILM\\data\\fridge\\seq_length_fusion.npy"
    eps: 1.0
    min_pts: 20
    metric: "euclidean"
    normalization_method: "zscore"
    col_index: 2
  

# Model hyperparameters
models:
  DummyModel:
    learning_rate: 0.01
    epochs: 10
    batch_size: 32
